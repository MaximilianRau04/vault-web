<nav class="navbar-bg shadow-md fixed w-full z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-15 items-center">
      <!-- Logo -->
      <div class="flex-shrink-0 text-xl font-semibold navbar-text-primary">
        Vault-Web
      </div>

      <!-- Desktop Links and Theme Toggle -->
      <div class="hidden md:flex space-x-6 items-center">
        <a
          routerLink="/"
          class="navbar-link"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: true }"
          >Home</a
        >
        <a
          routerLink="/dashboard"
          class="navbar-link"
          routerLinkActive="is-active"
          >Dashboard</a
        >
        <a routerLink="/cloud" class="navbar-link" routerLinkActive="is-active"
          >Cloud</a
        >
        <a
          routerLink="/passwords"
          class="navbar-link"
          routerLinkActive="is-active"
          >Password Manager</a
        >

        <!-- Theme Toggle Button -->
        <button
          (click)="toggleTheme()"
          class="theme-toggle-btn ml-2"
          [title]="isDarkTheme ? 'Switch to light mode' : 'Switch to dark mode'"
        >
          <i *ngIf="isDarkTheme" class="pi pi-sun"></i>
          <i *ngIf="!isDarkTheme" class="pi pi-moon"></i>
        </button>

        <button type="button" class="logout-btn" (click)="logout()">
          Logout
        </button>
      </div>

      <!-- Mobile Hamburger and Theme Toggle -->
      <div class="md:hidden flex items-center space-x-3">
        <!-- Mobile Theme Toggle -->
        <button
          (click)="toggleTheme()"
          class="theme-toggle-btn"
          [title]="isDarkTheme ? 'Switch to light mode' : 'Switch to dark mode'"
        >
          <i *ngIf="isDarkTheme" class="pi pi-sun"></i>
          <i *ngIf="!isDarkTheme" class="pi pi-moon"></i>
        </button>

        <!-- Hamburger Menu -->
        <button
          (click)="toggleMobileMenu()"
          class="mobile-menu-toggle navbar-text-secondary focus:outline-none"
        >
          <i *ngIf="!isMobileMenuOpen" class="pi pi-bars"></i>
          <i *ngIf="isMobileMenuOpen" class="pi pi-times"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu Overlay -->
  <div *ngIf="isMobileMenuOpen" class="md:hidden mobile-menu px-4 pt-4">
    <a
      routerLink="/"
      (click)="closeMobileMenu()"
      class="mobile-link block py-2"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
      >Home</a
    >
    <a
      routerLink="/dashboard"
      (click)="closeMobileMenu()"
      class="mobile-link block py-2"
      routerLinkActive="is-active"
      >Dashboard</a
    >
    <a
      routerLink="/cloud"
      (click)="closeMobileMenu()"
      class="mobile-link block py-2"
      routerLinkActive="is-active"
      >Cloud</a
    >
    <a
      routerLink="/passwords"
      (click)="closeMobileMenu()"
      class="mobile-link block py-2"
      routerLinkActive="is-active"
      >Password Manager</a
    >
    <button type="button" class="mobile-logout" (click)="logout()">
      Logout
    </button>
  </div>
</nav>
